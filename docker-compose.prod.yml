services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hirehub}
      POSTGRES_USER: ${POSTGRES_USER:-hirehub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-hirehub}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-hirehub}
      PORT: 4000
      CORS_ORIGIN: ${PUBLIC_ORIGIN:-http://localhost}
      HH_TOKEN: ${HH_TOKEN:?set HH_TOKEN}
      SUPERJOB_TOKEN: ${SUPERJOB_TOKEN}
      HH_APP_NAME: ${HH_APP_NAME:-HireHub/1.0 (contact@hirehub.dev)}
      TG_CHANNELS: ${TG_CHANNELS:-}
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
