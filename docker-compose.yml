services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: hirehub
      POSTGRES_USER: hirehub
      POSTGRES_PASSWORD: hirehub_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://hirehub:hirehub_secret@db:5432/hirehub
      PORT: 4000
      CORS_ORIGIN: http://localhost:3000
      HH_TOKEN: ${HH_TOKEN}
      HH_APP_NAME: HireHub/1.0 (contact@hirehub.dev)
      # TG_CHANNELS=junior_jobs_it,it_work_ru
    ports:
      - "4000:4000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
